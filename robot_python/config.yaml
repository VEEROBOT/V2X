###############################################################################
# V2X Robot — Configuration
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  QUICK TUNING REFERENCE                                                 ║
# ║                                                                         ║
# ║  Robot too fast / slow on line   → lane_follower.linear_speed           ║
# ║  Robot turns too sharp / gentle  → lane_follower.max_angular_speed      ║
# ║  Speed when line lost / in gap   → lane_follower.lost_linear_frac       ║
# ║  How long before stopping blind  → lane_follower.lost_stop_s            ║
# ║  Yellow repel strength           → lane_follower.yellow_repel_frac      ║
# ║                                                                         ║
# ║  Joystick normal drive speed     → joystick.max_speed                   ║
# ║  Joystick turbo speed            → joystick.turbo_speed                 ║
# ║  Joystick turn rate              → joystick.max_steering                ║
# ╚══════════════════════════════════════════════════════════════════════════╝
###############################################################################


# ── Serial link to STM32 ─────────────────────────────────────────────────────
serial:
  port: /dev/ttyAMA0
  baudrate: 115200


# ── Robot physical parameters (don't change unless hardware changes) ──────────
robot:
  wheel_radius_m: 0.065
  track_width_m: 0.377
  max_wheel_speed_rad_s: 15.7
  cmd_vel_timeout_s: 0.5
  allow_wheel_reversal: true   # inner wheel may reverse during tight turns for full yaw authority
                                # false = clamp inner wheel to 0 (prevents spin-out but limits curves)


# ── Camera ────────────────────────────────────────────────────────────────────
camera:
  use_picamera2: true
  device: 0                      # used only when use_picamera2: false
  width: 320
  height: 240


# ── Lane Follower ─────────────────────────────────────────────────────────────
lane_follower:

  # --- Algorithm selection ---
  # pure_pursuit   : camera-only — follows a lookahead point on the line (smooth curves)
  # recorded_path  : camera + training data — blends learned curvature with live camera
  # centroid       : original — steers toward the averaged centroid of the line
  algorithm: pure_pursuit

  # --- Speed ---
  linear_speed: 0.10             # m/s — how fast the robot drives on the line
  max_angular_speed: 0.9         # rad/s — max turn rate (keep below 1.06 to avoid wheel reversal)
  lost_linear_frac: 0.45         # 45% speed while lost — slow enough to limit drift, fast enough to cross dash gaps
  lost_stop_s: 4.0               # seconds of pure LOST (no yellow either) before full stop
  no_white_stop_s: 8.0           # seconds of no white at all (LOST+YELLOW combined) before full stop

  # --- Pure Pursuit tuning (algorithm: pure_pursuit or recorded_path) ---
  # kpp=25 was too weak: max wz only 0.37 rad/s, robot achieved only 13% actual on curves.
  # kpp=50 caused instability when Ly was tiny (small n_strips). ly_min_px prevents that.
  kpp: 32.0                      # steering gain — raise if turns too gentle, lower if oscillating
  lookahead_frac: 0.35           # fraction of ROI height used as lookahead (0.3=sharp, 0.6=smooth)
  ly_min_px: 30                  # minimum Ly in formula — prevents blow-up when only near strips detected

  # --- Recorded Path — Learning from Demonstration ---
  #
  # HOW TO RECORD A TRAINING LAP:
  #   1. Set  algorithm: recorded_path above (this section)
  #   2. Press Start (joystick) to arm the robot
  #   3. Hold LB (deadman) — take manual control
  #   4. Press X → logs "Training STARTED" — recording begins
  #   5. Drive one complete clockwise loop (tag 0 → tag 0)
  #   6. Press X again → logs "Training SAVED" → file written to ~/v2x_training.json
  #   7. Release LB — robot switches to autonomous mode immediately,
  #      blending the learned curvature with live camera feedback
  #
  # HOW TO USE EXISTING TRAINING DATA (no new recording needed):
  #   1. Set  algorithm: recorded_path
  #   2. Arm and release LB — robot blends ff_blend fraction from file automatically
  #
  # HOW TO DEACTIVATE / SWITCH BACK:
  #   • To ignore training and use camera only:  set  use_training_data: false
  #   • To go back to pure camera steering:      set  algorithm: pure_pursuit
  #   • To go back to original centroid:         set  algorithm: centroid
  #
  # FILE: ~/v2x_training.json  (persists across reboots; delete to reset)
  # FORMAT: per-zone mean curvature and speed recorded during the training lap
  #
  use_training_data: false        # false = ignore training file, behave like pure_pursuit
  training_data_file: ~/v2x_training.json
  ff_blend: 0.70                 # 0.0=pure camera  1.0=pure training  0.7=recommended start

  # --- Centroid PID gains (algorithm: centroid) ---
  kp: 0.007                      # proportional: higher = sharper correction
  ki: 0.0                        # integral: leave at 0 (causes wind-up on this track)
  kd: 0.0                        # derivative: disabled — amplified centroid jumps into wz spikes

  # --- Geometry ---
  crop_top_ratio: 0.30           # discard top 30% of frame (sky/walls) — increase if line appears near top
  min_contour_area: 150          # px² — minimum blob size (filters floor noise)
  lane_offset_px: 0              # shift target left(−) or right(+) of frame centre

  # --- Yellow boundary avoidance ---
  yellow_repel_frac: 0.65        # how hard to steer away from yellow — increased from 0.40 (was too gentle)

  # --- HSV colour thresholds ---
  # Tip: watch the HSV MASK panel in the browser stream.
  #      White tape should show as light-grey, yellow/cyan tape as yellow.
  #      Adjust V_low if the line disappears in your lighting.

  # White centre-line
  white_h_low:   0
  white_h_high: 180
  white_s_low:   0
  white_s_high:  70
  white_v_low:  150              # lower this (e.g. 120) if white line isn't detected
  white_v_high: 255

  # Yellow boundary tape
  yellow_h_low:   20
  yellow_h_high:  35
  yellow_s_low:   80
  yellow_s_high: 255
  yellow_v_low:   80
  yellow_v_high: 255

  # Cyan — catches yellow tape when camera AWB shifts yellow → teal/cyan
  cyan_h_low:   80
  cyan_h_high: 100
  cyan_s_low:   80
  cyan_s_high: 255
  cyan_v_low:   80
  cyan_v_high: 255

  debug_image: false             # show OpenCV debug window (only when running with a display)


# ── AprilTag Position Estimator ───────────────────────────────────────────────
position:
  n_inner_tags: 10               # IDs 0-9 on the inner white oval
  n_outer_tags: 8                # IDs 10-17 on the outer boundary
  tag_spacing_m: 0.70            # distance between adjacent tags (m)
  tag_size_m: 0.10               # printed tag outer size (m)
  focal_px: 264.0                # camera focal length in pixels (320px wide IMX219)
  detect_every_n: 3              # run detector every Nth frame (~10 Hz at 30 fps)
  debug_image: false


# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  run_log: true                  # set false to disable ~/v2x_run.csv (saves disk I/O on long runs)


# ── Vision Stream (browser) ───────────────────────────────────────────────────
# Open http://<robot-ip>:5005/ in any browser on the same network.
stream:
  enabled: true
  port: 5005


# ── Position Broadcaster (peer UDP) ──────────────────────────────────────────
position_broadcaster:
  peer_ip: '192.168.0.255'
  peer_port: 5002
  broadcast_hz: 10.0
  role: car


# ── V2X Bridge ────────────────────────────────────────────────────────────────
v2x_bridge:
  role: car
  obu_binary: '../v2x_testbed/obu/build/obu_client'
  obu_config: '../v2x_testbed/obu/config/obu_local.json'
  manual_mode: false
  car_alert_port: 5001
  exit_clear_delay_s: 5.0
  obu_loop_count: 1


# ── Emergency Handler (car only) ─────────────────────────────────────────────
emergency_handler:
  # ── Direction ─────────────────────────────────────────────────────────────
  driving_direction: clockwise  # clockwise or counterclockwise
                                 # determines which side the inner island is on:
                                 #   clockwise      → inner island to robot's RIGHT
                                 #   counterclockwise → inner island to robot's LEFT
                                 # all angular speeds below are MAGNITUDES — the handler
                                 # applies the correct sign automatically.

  # ── EVADING: robot veers toward inner island ─────────────────────────────
  evasion_linear_speed: 0.06    # forward speed while evading (slow — turning dominates)
  evasion_angular_speed: 0.35   # magnitude of fallback turn when no yellow visible
                                 # 0.60 was too aggressive (inner wheel reversed, robot pivoted
                                 # → overshot the inner island)
  evasion_duration_s: 6.0       # backup timer if boundary_near never fires
  min_evasion_s: 0.2            # ignore boundary_near for first 0.2s
  # Yellow-tracking proportional control (active once yellow centroid is visible):
  #   err = yellow_cx / frame_w - evasion_yellow_target
  #   wz  = evasion_yellow_kp * err - 0.15   (clamped to [evasion_angular_speed, -0.05])
  evasion_yellow_target: 0.70   # want yellow at 70% across frame (right side = inner island)
  evasion_yellow_kp: 2.5        # gain per frame-width fraction (2.5 × 0.20 err = 0.50 wz)

  # ── HOLDING: slow creep while hugging inner yellow ───────────────────────
  hold_linear_speed: 0.04       # creep forward so robot moves with traffic (not a stationary obstacle)
                                 # yellow tracking keeps robot pinned to inner island during hold
  hold_timeout_s: 30.0
  clear_delay_s: 1.0

  # ── RECOVERING: drive back to white line ────────────────────────────────
  recovery_linear_speed: 0.08   # forward speed during outward arc
  recovery_angular_speed: 0.45  # magnitude — toward outer lane (away from inner island)
  recovery_duration_s: 2.5      # fallback timeout if white not found
  resume_ramp_duration_s: 2.0

  n_tags: 10
  yield_zone_gap: 3
  position_timeout_s: 3.0


# ── Joystick ──────────────────────────────────────────────────────────────────
joystick:
  device_index:       0
  deadman_button:     4          # hold LB to enable joystick
  turbo_button:       5          # hold RB simultaneously for turbo
  arm_button:         7          # press Start to arm / disarm
  amb_arrive_button:  0          # press A to simulate ambulance arriving (V2X test)
  amb_depart_button:  1          # press B to simulate ambulance departing
  train_button:       2          # press X to start/stop training recording

  # --- Speed limits ---
  max_speed:    0.30             # m/s — full stick forward (normal)
  turbo_speed:  0.60             # m/s — full stick forward in turbo mode
  max_steering: 1.20             # rad/s — full stick sideways

  deadzone:     0.10
  accel_rate:   2.0              # m/s² ramp up
  decel_rate:   4.0              # m/s² ramp down


# ── Control Socket ────────────────────────────────────────────────────────────
control:
  port: 5010


# ── Per-robot overrides ───────────────────────────────────────────────────────
car:
  lane_follower:
    linear_speed: 0.08           # slower than default (0.10) — robot physically can't turn at 0.10 on curves
  v2x_bridge:
    obu_loop_count: 1
  control:
    port: 5010

ambulance:
  lane_follower:
    linear_speed: 0.18
  v2x_bridge:
    obu_loop_count: 0
  control:
    port: 5011
