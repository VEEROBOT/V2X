###############################################################################
# V2X Robot — Configuration
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  QUICK TUNING REFERENCE                                                 ║
# ║                                                                         ║
# ║  Robot too fast / slow on line   → lane_follower.linear_speed           ║
# ║  Robot turns too sharp / gentle  → lane_follower.max_angular_speed      ║
# ║  Speed when line lost / in gap   → lane_follower.lost_linear_frac       ║
# ║  How long before stopping blind  → lane_follower.lost_stop_s            ║
# ║  Yellow repel strength           → lane_follower.yellow_repel_frac      ║
# ║                                                                         ║
# ║  Joystick normal drive speed     → joystick.max_speed                   ║
# ║  Joystick turbo speed            → joystick.turbo_speed                 ║
# ║  Joystick turn rate              → joystick.max_steering                ║
# ╚══════════════════════════════════════════════════════════════════════════╝
###############################################################################


# ── Serial link to STM32 ─────────────────────────────────────────────────────
serial:
  port: /dev/ttyAMA0    # UART to STM32; Pi 5 = ttyAMA0 (or ttyRobot symlink if udev rule set)
  baudrate: 115200       # must match STM32 firmware — do not change


# ── Robot physical parameters (don't change unless hardware changes) ──────────
robot:
  wheel_radius_m: 0.065         # axle centre to ground (Wolf platform: 130mm dia wheel = 65mm radius)
  track_width_m: 0.377          # left-to-right wheel contact distance (measured on chassis)
  max_wheel_speed_rad_s: 15.7   # ~150 RPM cap — from STM32 MOTOR_MAX_RPM; limits wheel command
  cmd_vel_timeout_s: 0.5        # STM32 auto-stops if no velocity command arrives in this window
  allow_wheel_reversal: true    # inner wheel may reverse during tight turns for full yaw authority
                                 # false = clamp inner wheel to 0 (prevents spin-out but limits curves)


# ── Camera ────────────────────────────────────────────────────────────────────
camera:
  use_picamera2: true   # true = Pi Camera v2/HQ via libcamera (recommended); false = USB webcam via OpenCV
  device: 0             # OpenCV device index — only used when use_picamera2: false
  width: 320            # processing resolution — 320×240 is optimal for Pi 5 (speed + accuracy)
  height: 240           # do not increase without checking CPU headroom (htop while running)


# ── Lane Follower ─────────────────────────────────────────────────────────────
lane_follower:

  # --- Algorithm selection ---
  # pure_pursuit   : camera-only — follows a lookahead point on the line (smooth curves)
  # recorded_path  : camera + training data — blends learned curvature with live camera
  # centroid       : original — steers toward the averaged centroid of the line
  algorithm: pure_pursuit
 
  # --- Speed ---
  linear_speed: 0.10             # m/s — how fast the robot drives on the line
  max_angular_speed: 0.9         # rad/s — max turn rate (keep below 1.06 to avoid wheel reversal)
  lost_linear_frac: 0.45         # 45% speed while lost — slow enough to limit drift, fast enough to cross dash gaps
  lost_stop_s: 4.0               # seconds of pure LOST (no yellow either) before full stop
  no_white_stop_s: 8.0           # seconds of no white at all (LOST+YELLOW combined) before full stop

  # --- Pure Pursuit tuning (algorithm: pure_pursuit or recorded_path) ---
  # kpp=25 was too weak: max wz only 0.37 rad/s, robot achieved only 13% actual on curves.
  # kpp=50 caused instability when Ly was tiny (small n_strips). ly_min_px prevents that.
  kpp: 22.0                      # steering gain — raise if turns too gentle, lower if oscillating
  lookahead_frac: 0.45           # fraction of ROI height used as lookahead (0.3=sharp, 0.6=smooth)
  ly_min_px: 30                  # minimum Ly in formula — prevents blow-up when only near strips detected

  # --- Recorded Path — Learning from Demonstration ---
  #
  # HOW TO RECORD A TRAINING LAP:
  #   1. Set  algorithm: recorded_path above (this section)
  #   2. Press Start (joystick) to arm the robot
  #   3. Hold LB (deadman) — take manual control
  #   4. Press X → logs "Training STARTED" — recording begins
  #   5. Drive one complete clockwise loop (tag 0 → tag 0)
  #   6. Press X again → logs "Training SAVED" → file written to ~/v2x_training.json
  #   7. Release LB — robot switches to autonomous mode immediately,
  #      blending the learned curvature with live camera feedback
  #
  # HOW TO USE EXISTING TRAINING DATA (no new recording needed):
  #   1. Set  algorithm: recorded_path
  #   2. Arm and release LB — robot blends ff_blend fraction from file automatically
  #
  # HOW TO DEACTIVATE / SWITCH BACK:
  #   • To ignore training and use camera only:  set  use_training_data: false
  #   • To go back to pure camera steering:      set  algorithm: pure_pursuit
  #   • To go back to original centroid:         set  algorithm: centroid
  #
  # FILE: ~/v2x_training.json  (persists across reboots; delete to reset)
  # FORMAT: per-zone mean curvature and speed recorded during the training lap
  #
  use_training_data: false        # false = ignore training file, behave like pure_pursuit
  training_data_file: ~/v2x_training.json
  ff_blend: 0.70                 # 0.0=pure camera  1.0=pure training  0.7=recommended start

  # --- Centroid PID gains (algorithm: centroid) ---
  kp: 0.007                      # proportional: higher = sharper correction
  ki: 0.0                        # integral: leave at 0 (causes wind-up on this track)
  kd: 0.0                        # derivative: disabled — amplified centroid jumps into wz spikes

  # --- Geometry ---
  crop_top_ratio: 0.30           # discard top 30% of frame (sky/walls) — increase if line appears near top
  min_contour_area: 150          # px² — minimum blob size (filters floor noise)
  lane_offset_px: 0              # shift target left(−) or right(+) of frame centre

  # --- Yellow boundary avoidance ---
  yellow_repel_frac: 0.65        # how hard to steer away from yellow — increased from 0.40 (was too gentle)

  debug_image: false             # show OpenCV debug window (only when running with a display)

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  HSV COLOUR THRESHOLDS  —  tune here when changing location/lighting    │
  # │                                                                         │
  # │  FACTORY DEFAULTS (copy these back if you break something):             │
  # │                                                                         │
  # │    white_h_low: 0    white_h_high: 180                                  │
  # │    white_s_low: 0    white_s_high:  70                                  │
  # │    white_v_low: 150  white_v_high: 255                                  │
  # │                                                                         │
  # │    yellow_h_low:  20  yellow_h_high:  35                                │
  # │    yellow_s_low:  80  yellow_s_high: 255                                │
  # │    yellow_v_low:  80  yellow_v_high: 255                                │
  # │                                                                         │
  # │    cyan_h_low:  80  cyan_h_high: 100                                    │
  # │    cyan_s_low:  80  cyan_s_high: 255                                    │
  # │    cyan_v_low:  80  cyan_v_high: 255                                    │
  # │                                                                         │
  # │  HOW TO TUNE (2 minutes):                                               │
  # │    1. Open stream in browser:  http://<robot-ip>:5005/                  │
  # │    2. Watch the bottom-right "HSV MASK" panel:                          │
  # │         White tape  → must show as solid white blobs                    │
  # │         Yellow tape → must show as solid white blobs                    │
  # │         Floor / walls / ceiling → must be BLACK                         │
  # │    3. Edit the values below, save, then restart:                        │
  # │         sudo systemctl restart v2x_car                                  │
  # │    4. Repeat until mask is clean.                                       │
  # │                                                                         │
  # │  WHAT H / S / V MEAN:                                                   │
  # │    H = Hue        — the colour  (0=red  30=yellow  120=blue  180=end)   │
  # │                     OpenCV uses 0–180 (half of the standard 360°)       │
  # │    S = Saturation — 0=grey/white   →   255=vivid colour                 │
  # │    V = Value      — 0=black        →   255=bright                       │
  # │                                                                         │
  # │  WHITE TAPE — what to change:                                           │
  # │    Robot ignores white line (shows LOST):                               │
  # │      → lower white_v_low  (try 130 → 110 → 90)                          │
  # │        cause: lighting too dim, tape not bright enough                  │
  # │    Robot follows floor / walls (shows WHITE but drives wrong):          │
  # │      → raise white_v_low  (try 170 → 185 → 200)                         │
  # │        cause: floor is too bright, mistaken for white tape              │
  # │    Robot wobbles on straight line:                                      │
  # │      → lower white_s_high  (try 60 → 50)                                │
  # │        cause: slightly coloured surface leaking into white mask         │
  # │    Daylight / bright room:  raise white_v_low to 180–200                │
  # │    Dark room / dim lights:  lower white_v_low to 120–130                │
  # │                                                                         │
  # │  YELLOW TAPE — what to change:                                          │
  # │    Robot crosses yellow boundary (not detecting it):                    │
  # │      → lower yellow_s_low  (try 60 → 40)                                │
  # │      → widen H range: h_low 15, h_high 40                               │
  # │    Random yellow detections (false positives):                          │
  # │      → raise yellow_s_low  (try 100 → 120)                              │
  # │      → narrow H range: h_low 22, h_high 32                              │
  # │    Yellow tape looks teal/blue on stream:                               │
  # │      → cyan range below catches it automatically, no change needed      │
  # │                                                                         │
  # │  SAFE LIMITS — do not go outside these:                                 │
  # │    white_v_low   : 90 – 210   (below 90 = floor is white everywhere)    │
  # │    white_s_high  : 40 – 90    (below 40 = misses slightly off-white)    │
  # │    yellow_h_low  : 15 – 25    (below 15 = red starts leaking in)        │
  # │    yellow_h_high : 30 – 45    (above 45 = green starts leaking in)      │
  # │    yellow_s_low  : 40 – 120   (balance: sensitivity vs. noise)          │
  # └─────────────────────────────────────────────────────────────────────────┘

  # White centre-line (40 mm tape)
  white_h_low:   0     # keep 0 — white has no hue, accept all colours
  white_h_high: 180    # keep 180 — white has no hue, accept all colours
  white_s_low:   0     # keep 0 — white is fully desaturated (S near zero)
  white_s_high:  70    # max saturation to count as white — lower if coloured floor leaks in (try 50)
  white_v_low:  150    # ← MOST COMMON CHANGE: raise (170–200) if floor shows as white; lower (110–130) if tape not detected
  white_v_high: 255    # keep 255 — always accept the brightest whites

  # Yellow boundary tape (40 mm, inner island + outer boundary)
  yellow_h_low:   20   # lower hue limit for yellow — do not go below 15 (red starts leaking in)
  yellow_h_high:  35   # upper hue limit for yellow — do not go above 45 (green starts leaking in)
  yellow_s_low:   80   # ← raise (100–120) if floor/objects trigger false yellow; lower (40–60) if tape missed
  yellow_s_high: 255   # keep 255 — accept any saturation above s_low
  yellow_v_low:   80   # lower if yellow tape is dim / shadowed (try 50); raise if bright non-yellow detected
  yellow_v_high: 255   # keep 255 — always accept bright yellows

  # Cyan fallback — catches yellow tape when camera AWB shifts it to teal/cyan
  # Leave these alone unless cyan/teal objects in the arena cause false detections
  cyan_h_low:   80     # start of cyan/teal hue range
  cyan_h_high: 100     # end of cyan/teal hue range — widen (to 110) if AWB shifts further blue
  cyan_s_low:   80     # same logic as yellow_s_low — raise to reject noise, lower if teal tape missed
  cyan_s_high: 255     # keep 255
  cyan_v_low:   80     # keep in sync with yellow_v_low
  cyan_v_high: 255     # keep 255


# ── AprilTag Position Estimator ───────────────────────────────────────────────
position:
  n_inner_tags: 10               # IDs 0-9 on the inner white oval
  n_outer_tags: 8                # IDs 10-17 on the outer boundary
  tag_spacing_m: 0.70            # distance between adjacent tags (m)
  tag_size_m: 0.10               # printed tag outer size (m)
  focal_px: 264.0                # camera focal length in pixels (320px wide IMX219)
  detect_every_n: 3              # run detector every Nth frame (~10 Hz at 30 fps)
  debug_image: false    # show AprilTag overlay in a window — only works when a display is connected

  # ── Position mode ────────────────────────────────────────────────────────────
  # tag_only       : distance_m updates only when an AprilTag is detected (default, safe)
  # dead_reckoning : distance_m is integrated continuously from wheel encoder ticks
  #                  between tag sightings. Zone stays as last seen tag. Resets to 0
  #                  on every new tag detection — ground truth always wins.
  #                  Uses ticks_per_rev and wheel_radius_m below.
  position_mode: tag_only
  ticks_per_rev: 3600        # from STM32 robot_config.h: 900 CPR × 4 (quadrature X4)


# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  run_log: false                 # set false to disable ~/v2x_run.csv (saves disk I/O on long runs)


# ── Vision Stream (browser) ───────────────────────────────────────────────────
# Open http://<robot-ip>:5005/ in any browser on the same network.
stream:
  enabled: true   # false = disable stream to save CPU (e.g. during final demo if not needed)
  port: 5005      # browser URL: http://<robot-ip>:5005/


# ── Position Broadcaster (peer UDP) ──────────────────────────────────────────
position_broadcaster:
  peer_ip: '192.168.0.255'  # broadcast to all devices on subnet; or set a specific robot IP
  peer_port: 5002            # UDP port — must match on all robots (car listens, ambulance sends)
  broadcast_hz: 10.0         # position updates per second — 10 Hz is sufficient for zone tracking
  role: car                  # do not change here — ambulance uses its own config section below


# ── V2X Bridge ────────────────────────────────────────────────────────────────
v2x_bridge:
  role: car                                                    # do not change
  obu_binary: '../v2x_testbed/obu/build/obu_client'           # path to OBU binary — built by setup.sh
  obu_config: '../v2x_testbed/obu/config/obu_local.json'      # per-device config (RSU IP etc) — generated by setup.sh
  manual_mode: false        # true = bypass OBU, inject fake emergency locally (testing without RSU)
  car_alert_port: 5001      # UDP port to receive emergency alerts from RSU — must match rsu_config.json
  exit_clear_delay_s: 5.0   # seconds to wait after V2X emergency clears before allowing RECOVERING
  obu_loop_count: 1         # auth cycles: 1 = car (one-shot), 0 = ambulance (continuous re-auth)


# ── Emergency Handler (car only) ─────────────────────────────────────────────
emergency_handler:
  # ── Direction ─────────────────────────────────────────────────────────────
  driving_direction: clockwise  # clockwise or counterclockwise
                                 # determines which side the inner island is on:
                                 #   clockwise      → inner island to robot's RIGHT
                                 #   counterclockwise → inner island to robot's LEFT
                                 # all angular speeds below are MAGNITUDES — the handler
                                 # applies the correct sign automatically.

  evasion_side: inner           # inner = veer toward inner island (default, original behaviour)
                                 # outer = veer toward outer boundary
                                 # flip this one word to switch; no other changes needed.

  # ── EVADING: robot veers toward evasion boundary ────────────────────────
  evasion_linear_speed: 0.06    # forward speed while evading (slow — turning dominates)
  evasion_angular_speed: 0.35   # magnitude of fallback turn when no yellow visible
                                 # 0.60 was too aggressive (inner wheel reversed, robot pivoted
                                 # → overshot the inner island)
  evasion_duration_s: 6.0       # backup timer if boundary_near never fires
  min_evasion_s: 0.2            # ignore boundary_near for first 0.2s
  # Yellow-tracking proportional control (active once yellow centroid is visible):
  #   err = yellow_cx / frame_w - evasion_yellow_target
  #   wz  = evasion_yellow_kp * err - 0.15   (clamped to [evasion_angular_speed, -0.05])
  evasion_yellow_target: 0.70   # want yellow at 70% across frame (right side = inner island)
  evasion_yellow_kp: 2.5        # gain per frame-width fraction (2.5 × 0.20 err = 0.50 wz)

  # ── HOLDING: slow creep while hugging inner yellow ───────────────────────
  hold_linear_speed: 0.04       # creep forward so robot moves with traffic (not a stationary obstacle)
                                 # yellow tracking keeps robot pinned to inner island during hold
  hold_timeout_s: 30.0     # safety net — force RECOVERING after this long even if ambulance still behind
  clear_delay_s: 1.0       # grace period after ambulance passes before starting RECOVERING arc

  # ── RECOVERING: drive back to white line ────────────────────────────────
  recovery_linear_speed: 0.08   # forward speed during outward arc
  recovery_angular_speed: 0.45  # magnitude — toward outer lane (away from inner island)
  recovery_duration_s: 3.5      # fallback timeout if white not found (2.5 was too short)
  resume_ramp_duration_s: 2.0   # ramp speed up over this many seconds after RECOVERING (prevents jerk)

  n_tags: 10              # must match position.n_inner_tags — total inner oval tags
  yield_zone_gap: 3       # yield only when ambulance is within this many zones behind (~2.1 m at 0.70 m spacing)
  position_timeout_s: 3.0 # if no position update received in this window, treat position as stale

  # ── RECOVERING exit mode ─────────────────────────────────────────────────────
  # timer : exit after recovery_duration_s (default — safe, always works)
  # gyro  : exit after the robot has rotated recovery_target_deg as measured by
  #         the STM32 IMU (gyro_z, rad/s). Falls back to timer if insufficient
  #         valid gyro samples accumulate — so this is always safe.
  #         IMU is inside the chassis near motors → use spike rejection.
  recovery_exit_mode: timer
  recovery_target_deg: 30.0       # degrees to rotate before exiting (gyro mode)
  gyro_max_rad_s: 4.0             # spike filter — discard |gyro_z| above this
  gyro_min_samples: 3             # min valid readings before trusting accumulation


# ── Joystick ──────────────────────────────────────────────────────────────────
joystick:
  device_index:       0
  deadman_button:     4          # hold LB to enable joystick
  turbo_button:       5          # hold RB simultaneously for turbo
  arm_button:         7          # press Start to arm / disarm
  amb_arrive_button:  0          # press A to simulate ambulance arriving (V2X test)
  amb_depart_button:  1          # press B to simulate ambulance departing
  train_button:       2          # press X to start/stop training recording

  # --- Speed limits ---
  max_speed:    0.30             # m/s — full stick forward (normal)
  turbo_speed:  0.60             # m/s — full stick forward in turbo mode
  max_steering: 1.20             # rad/s — full stick sideways

  deadzone:     0.10   # stick inputs below this fraction are ignored (prevents drift from off-centre sticks)
  accel_rate:   2.0    # m/s² — how quickly speed ramps up when stick is pushed
  decel_rate:   4.0    # m/s² — how quickly speed ramps down when stick is released (higher = snappier stop)


# ── Control Socket ────────────────────────────────────────────────────────────
control:
  port: 5010   # TCP port for remote commands (arm/disarm/estop); car=5010, ambulance=5011


# ── Per-robot overrides ───────────────────────────────────────────────────────
# Values here override the defaults above for each robot type.
# main_car.py loads the [car] section; main_ambulance.py loads the [ambulance] section.
car:
  lane_follower:
    linear_speed: 0.08     # car drives slower than default — chassis can't turn cleanly at 0.10 m/s on curves
  v2x_bridge:
    obu_loop_count: 1      # car authenticates once then listens for alerts
  control:
    port: 5010

ambulance:
  lane_follower:
    linear_speed: 0.18     # ambulance drives faster so it can catch and overtake the car
  v2x_bridge:
    obu_loop_count: 0      # 0 = re-authenticate continuously — keeps ambulance connected to RSU at all times
  control:
    port: 5011             # separate port so both robots can be controlled from the same laptop
