###############################################################################
# AprilTag Position Estimator Configuration
#
# Road layout (2 m × 2 m rounded-square loop):
#   Tags are printed in the WHITE CENTRE-LINE GAPS, every tag_spacing_m.
#   Tag IDs must be numbered in order of travel direction: 0, 1, 2, ...
#
# Tag family: AprilTag 36h11
#   Print from: https://github.com/AprilRobotics/apriltag-imgs
#   (tag36h11/tag36_11_00000.png, tag36_11_00001.png, …)
#
# Calibrating focal_px (do this once on the actual Pi + camera):
#   1. Hold a tag at a measured distance D (e.g. 0.30 m)
#   2. Launch with debug_image:=true and count pixel_width of the tag
#   3. focal_px = pixel_width * D / tag_size_m
#   Example: pixel_width=75px, D=0.30m, tag_size=0.08m → focal_px = 75*0.3/0.08 = 281
#
# QUICK CALIBRATION STEPS:
#   1. Print one tag at target size (e.g. 8 cm × 8 cm)
#   2. Place it on the road exactly 0.30 m in front of camera
#   3. Launch: ros2 launch v2x_robot car.launch.py debug_image:=true
#   4. View /position/debug — read pixel_width of tag from image
#   5. Update focal_px below and restart
###############################################################################

position:
  ros__parameters:

    # ── Track layout ────────────────────────────────────────────────────────
    # Platform: 4×4 foam mats, each 60 cm × 60 cm → 2.4 m × 2.4 m total
    # Corner radius: ~45–50 cm → perimeter ≈ 11 m
    # At 0.5 m tag spacing: ~22 tags (adjust n_tags to actual count you print)
    n_tags: 22               # Total number of AprilTags around the full loop
                             # Count your actual printed tags and set this exactly!
    tag_spacing_m: 0.5       # Physical distance between consecutive tags (metres)

    # ── Tag physical size ────────────────────────────────────────────────────
    tag_size_m: 0.08         # Side length of the black border square (metres)
                             # Print at 8 cm for a 0.3–0.6 m detection range

    # ── Camera calibration ───────────────────────────────────────────────────
    focal_px: 250.0          # Effective focal length in pixels (see CALIBRATION above)
                             # Default 250 is approximate for Pi Cam v2 at 320 px width

    # ── Performance ──────────────────────────────────────────────────────────
    detect_every_n: 3        # Run ArUco detector on every Nth camera frame
                             # 3 = ~10 detections/sec at 30 fps camera — sufficient
                             # Lower to 1 if detection is too slow; raise to 5 on slow Pi

    # ── Debug ────────────────────────────────────────────────────────────────
    debug_image: false       # Publish annotated frame to /position/debug


###############################################################################
# Position broadcaster (peer-to-peer UDP position sharing)
# Override peer_ip in each robot's launch file — it must point to the OTHER robot.
###############################################################################

position_broadcaster:
  ros__parameters:

    peer_ip:      ''         # Set in launch file: car → ambulance IP, ambu → car IP
    peer_port:    5002       # UDP port used by BOTH robots for position exchange
    broadcast_hz: 10.0       # Broadcasts per second (10 Hz is plenty for a slow track)
    role:         'car'      # Override in launch file: 'car' | 'ambulance'
