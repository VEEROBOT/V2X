###############################################################################
# Line Follower Configuration
#
# Road layout (4×4 foam mats, 2.4 m × 2.4 m rounded-square loop):
#
#  [Black boundary] [  Black road  ] [White dashed centre] [  Black road  ] [Black boundary]
#              Optional on straights: [Yellow yield zone] (target for car when yielding)
#
#   • Black: road surface AND outer/inner boundaries
#   • White dashes: centre line — DEFAULT travel path for BOTH robots
#   • Yellow dashes: yield zone on straight sections only (where car moves to during evasion)
#   • AprilTags: printed in the white centre-line gaps, every 0.5 m
#
# Both robots follow the WHITE CENTRE LINE by default (lane_offset_px = 0).
# The ambulance runs faster (0.28 m/s) and catches up from behind.
# When the car yields, it steers LEFT off the centre line toward the yellow yield zone.
# The ambulance then passes through on the centre.
#
# Tune these values on the actual vinyl road before the demo.
# Use debug_image:=true at launch to see the detected centroid live.
#
# QUICK CALIBRATION STEPS:
#   1. Place robot on the lane, run with debug_image:=true
#   2. View /line_follower/debug in rqt_image_view
#      → Green line = frame centre
#      → Orange line = lane target (shift with lane_offset_px)
#      → Red dot = detected marking centroid
#   3. Adjust white_v_low / yellow HSV until only road markings are lit
#   4. Adjust lane_offset_px until orange target line sits in the lane centre
#   5. Adjust kp until tracking is smooth; add kd to damp oscillation
###############################################################################

line_follower:
  ros__parameters:

    # ── Motion ──────────────────────────────────────────────────────────────
    linear_speed: 0.20          # m/s  — conservative start for indoor vinyl
                                # Raise to 0.30 once tracking is stable
    max_angular_speed: 1.2      # rad/s — maximum turn rate
    crop_top_ratio: 0.55        # Fraction of frame height to ignore from top.
                                # 0.55 = use bottom 45 % of image as ROI
    min_contour_area: 150       # px²  — lowered for thin yellow bars and short
                                # white dashes; raise if noise is detected

    # ── PID gains ───────────────────────────────────────────────────────────
    kp: 0.005                   # Proportional  (primary tuning knob)
    ki: 0.0001                  # Integral      (correct steady-state offset)
    kd: 0.002                   # Derivative    (damp oscillation)

    # ── White lane thresholds (HSV) ─────────────────────────────────────────
    # Vinyl white road marking: any hue, very low saturation, high brightness.
    # If the whole road is white vinyl, rely on yellow centre line instead.
    white_h_low:   0
    white_h_high: 180
    white_s_low:   0
    white_s_high:  55
    white_v_low:  190
    white_v_high: 255

    # ── Yellow lane thresholds (HSV) ────────────────────────────────────────
    # Yellow centre-line on printed road.  Adjust h_low/h_high if the printed
    # yellow looks orange (lower h_low to ~15) or green (raise h_high to ~40).
    yellow_h_low:   20
    yellow_h_high:  35
    yellow_s_low:   80
    yellow_s_high: 255
    yellow_v_low:   80
    yellow_v_high: 255

    # ── Lane offset ─────────────────────────────────────────────────────────
    # Both robots default to 0 (track the white centre line directly).
    # Override this per-robot in the launch file if needed.
    #   +ve → target moves right (robot sits left of centre line)
    #   -ve → target moves left  (robot sits right of centre line)
    lane_offset_px: 0

    # ── Debug ───────────────────────────────────────────────────────────────
    debug_image: false          # Set true to publish /line_follower/debug
