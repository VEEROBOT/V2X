###############################################################################
# LYRA ROBOT MASTER CONFIGURATION
# 
# SINGLE SOURCE OF TRUTH for all physical robot parameters.
# All other packages should reference these values.
#
# Change values HERE, not in individual package configs.
###############################################################################

/**:
  ros__parameters:
    # ==========================================================================
    # ROBOT PHYSICAL DIMENSIONS
    # ==========================================================================
    robot:
      # Wheel parameters
      wheel_diameter_m: 0.13       # 130mm diameter wheels
      wheel_radius_m: 0.065        # wheel_diameter / 2
      track_width_m: 0.377         # Distance between left/right wheel centers
      
      # Encoder parameters
      ticks_per_rev: 3600          # Encoder ticks per wheel revolution
      
      # Kinematic limits
      max_wheel_speed_rad_s: 15.7  # ~150 RPM maximum wheel speed
      max_linear_vel_m_s: 1.0      # Maximum forward/backward speed
      max_angular_vel_rad_s: 3.0   # Maximum rotation speed
      
      # Robot footprint (for Nav2 collision checking)
      robot_radius_m: 0.15         # 300mm diameter / 2
      
    # ==========================================================================
    # TF FRAME NAMES
    # ==========================================================================
    frames:
      map: map
      odom: odom
      base_footprint: base_footprint
      base_link: base_link
      imu_link: imu_link
      lidar_link: lidar_link
      camera_link: camera_link
      camera_optical_link: camera_optical_link

    # ==========================================================================
    # SERIAL COMMUNICATION (STM32)
    # ==========================================================================
    serial:
      port: /dev/ttyAMA0           # RPi GPIO UART (pins 14/15)
      baudrate: 115200             # Must match STM32 setting
