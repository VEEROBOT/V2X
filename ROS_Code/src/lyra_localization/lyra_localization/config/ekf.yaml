ekf_filter_node:
  ros__parameters:

    frequency: 20.0
    sensor_timeout: 0.5
    two_d_mode: true

    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # =================================================
    # WHEEL ODOMETRY — X and Y position, vx velocity
    # =================================================
    odom0: /wheel/odom
    
    # Single-line format to avoid YAML parsing issues
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Use x, y position and x velocity from wheel odometry
    odom0_config: [true, true, false, false, false, false, true, false, false, false, false, false, false, false, false]

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # =================================================
    # IMU — ABSOLUTE YAW + YAW RATE
    # =================================================
    imu0: /imu/data
    imu0_remove_gravitational_acceleration: true    
    # Single-line format
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Use absolute yaw AND yaw rate from IMU
    imu0_config: [false, false, false, false, false, false, false, false, false, false, false, true, false, false, false]

    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

    # =================================================
    # PROCESS NOISE COVARIANCE
